name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: 📦 Enable corepack
        run: |
          npm install -g --force corepack@latest
          corepack enable

      - name: 💾 Setup Node.js 24
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚧 Set up project
        run: pnpm dev:prepare

      - name: 🛠 Build project
        run: pnpm build

      - name: 🛝 Build playground
        run: pnpm dev:build

      - name: 👀 Lint project
        run: pnpm lint

      - name: 🧪 Test project
        run: pnpm test